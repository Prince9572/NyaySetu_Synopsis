<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta 
    name="viewport" 
    content="width=device-width, initial-scale=1.0"
  >

  <title>Crypto Live Tracker</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      padding:30px;
      min-height:100vh;
    }

    h1{
      text-align:center;
      margin-bottom:30px;
      font-size:45px;
      color:#38bdf8;
    }

    .search-box{
      display:flex;
      justify-content:center;
      margin-bottom:30px;
    }

    input{
      width:350px;
      padding:15px;
      border:none;
      outline:none;
      border-radius:12px;
      font-size:16px;
    }

    .coins{
      display:grid;
      grid-template-columns:
      repeat(auto-fit,minmax(260px,1fr));
      gap:25px;
    }

    .card{
      background:#1e293b;
      padding:25px;
      border-radius:20px;
      transition:0.3s;
      box-shadow:
      0 10px 25px rgba(0,0,0,0.4);
    }

    .card:hover{
      transform:translateY(-8px);
    }

    .top{
      display:flex;
      align-items:center;
      gap:15px;
      margin-bottom:20px;
    }

    .top img{
      width:50px;
      height:50px;
    }

    .name{
      font-size:22px;
      font-weight:bold;
    }

    .price{
      font-size:28px;
      margin-bottom:10px;
      color:#22c55e;
    }

    .market{
      color:#cbd5e1;
      margin-top:8px;
    }

    .change-positive{
      color:#22c55e;
    }

    .change-negative{
      color:#ef4444;
    }

  </style>
</head>

<body>

  <h1>🚀 Crypto Live Tracker</h1>

  <div class="search-box">

    <input
      type="text"
      id="searchInput"
      placeholder="Search cryptocurrency..."
    >

  </div>

  <div class="coins" id="coins"></div>

  <script>

    const coinsContainer =
      document.getElementById("coins");

    const searchInput =
      document.getElementById("searchInput");

    let allCoins = [];

    async function fetchCoins(){

      try{

        const response = await fetch(
          "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=20&page=1&sparkline=false"
        );

        const data = await response.json();

        allCoins = data;

        displayCoins(data);

      }catch(error){

        coinsContainer.innerHTML = `
          <h2>
            Failed to load data
          </h2>
        `;

      }

    }

    function displayCoins(coins){

      coinsContainer.innerHTML = "";

      coins.forEach(coin => {

        const changeClass =
          coin.price_change_percentage_24h >= 0
          ? "change-positive"
          : "change-negative";

        coinsContainer.innerHTML += `

          <div class="card">

            <div class="top">

              <img src="${coin.image}">

              <div>

                <div class="name">
                  ${coin.name}
                </div>

                <div>
                  ${coin.symbol.toUpperCase()}
                </div>

              </div>

            </div>

            <div class="price">
              $${coin.current_price}
            </div>

            <div class="${changeClass}">
              24h:
              ${coin.price_change_percentage_24h.toFixed(2)}%
            </div>

            <div class="market">
              Market Cap:
              $${coin.market_cap.toLocaleString()}
            </div>

          </div>

        `;

      });

    }

    searchInput.addEventListener(
      "input",
      () => {

        const value =
          searchInput.value.toLowerCase();

        const filteredCoins =
          allCoins.filter(coin =>

            coin.name
            .toLowerCase()
            .includes(value)

          );

        displayCoins(filteredCoins);

      }
    );

    fetchCoins();

  </script>

</body>
</html>
