<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta 
    name="viewport" 
    content="width=device-width, initial-scale=1.0"
  >

  <title>AI Quote Generator</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
      linear-gradient(135deg,#0f172a,#1e293b,#334155);
      padding:20px;
      color:white;
    }

    .container{
      width:100%;
      max-width:700px;
      background:
      rgba(255,255,255,0.08);

      backdrop-filter:blur(10px);

      border-radius:25px;

      padding:40px;

      box-shadow:
      0 10px 30px rgba(0,0,0,0.4);

      text-align:center;
    }

    h1{
      font-size:45px;
      margin-bottom:25px;
      color:#38bdf8;
    }

    .quote-box{
      margin-top:30px;
      background:
      rgba(255,255,255,0.08);

      padding:35px;

      border-radius:20px;

      min-height:220px;

      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;

      transition:0.4s;
    }

    .quote{
      font-size:28px;
      line-height:1.6;
      margin-bottom:25px;
    }

    .author{
      color:#facc15;
      font-size:20px;
    }

    button{
      margin-top:30px;
      padding:15px 30px;
      border:none;
      border-radius:14px;
      background:#38bdf8;
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#0ea5e9;
      transform:scale(1.05);
    }

    .top{
      color:#cbd5e1;
      font-size:18px;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>✨ AI Quote Generator</h1>

    <div class="top">
      Motivational Quotes Already Added
    </div>

    <div class="quote-box">

      <div class="quote" id="quote">

        "Success is not final,
        failure is not fatal:
        it is the courage to continue
        that counts."

      </div>

      <div class="author" id="author">
        — Winston Churchill
      </div>

    </div>

    <button onclick="generateQuote()">
      Generate New Quote
    </button>

  </div>

  <script>

    const quotes = [

      {
        quote:
        "Dream big and dare to fail.",
        author:
        "Norman Vaughan"
      },

      {
        quote:
        "Push yourself because no one else is going to do it for you.",
        author:
        "Unknown"
      },

      {
        quote:
        "Great things never come from comfort zones.",
        author:
        "Anonymous"
      },

      {
        quote:
        "Your future is created by what you do today.",
        author:
        "Robert Kiyosaki"
      },

      {
        quote:
        "Do something today that your future self will thank you for.",
        author:
        "Sean Patrick Flanery"
      },

      {
        quote:
        "Small steps every day lead to massive success.",
        author:
        "Unknown"
      },

      {
        quote:
        "Discipline is the bridge between goals and accomplishment.",
        author:
        "Jim Rohn"
      },

      {
        quote:
        "Don’t stop until you’re proud.",
        author:
        "Anonymous"
      }

    ];

    function generateQuote(){

      const random =
      Math.floor(
        Math.random() * quotes.length
      );

      document.getElementById("quote")
      .innerText =
      `"${quotes[random].quote}"`;

      document.getElementById("author")
      .innerText =
      `— ${quotes[random].author}`;

    }

  </script>

</body>
</html>
